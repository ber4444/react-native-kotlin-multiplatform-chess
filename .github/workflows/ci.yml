name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── chess-core: Kotlin/JS build + commonTest suite ───────────────────────────
  chess-core:
    name: chess-core (Kotlin/JS + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Build Kotlin/JS + run commonTest
        working-directory: chess-core
        run: ./gradlew jsNodeTest copyJsToApp --no-daemon
      - name: Upload chess-core JS
        uses: actions/upload-artifact@v4
        with:
          name: chess-core-js
          path: my-app/src/generated/chess-core
          include-hidden-files: true

  # ── RN app: typecheck + lint + web build ─────────────────────────────────────
  app-web:
    name: RN app (typecheck + lint + web)
    runs-on: ubuntu-latest
    needs: chess-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Download chess-core JS
        uses: actions/download-artifact@v4
        with:
          name: chess-core-js
          path: my-app/src/generated/chess-core
      - name: Checkout compose-multiplatform-chess for assets
        uses: actions/checkout@v4
        with:
          repository: ber4444/compose-multiplatform-chess
          path: compose-multiplatform-chess
      - name: Generate 3D assets (split glb + piece paths)
        working-directory: my-app
        run: npm run prepare:assets
        env:
          COMPOSE_CHESS_PATH: ${{ github.workspace }}/compose-multiplatform-chess
      - name: Typecheck
        working-directory: my-app
        run: npm run typecheck
      - name: Lint
        working-directory: my-app
        run: npm run lint
      - name: Build web bundle
        working-directory: my-app
        run: npm run build:web

  # ── Electron desktop: syntax-check main/preload + electron binary ─────────────
  electron:
    name: Electron (scripts + electron check)
    runs-on: ubuntu-latest
    needs: app-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Syntax-check Electron scripts
        working-directory: my-app
        run: node --check electron/main.cjs && node --check electron/preload.cjs
      - name: Verify electron binary
        working-directory: my-app
        run: npx electron --no-sandbox --version

  # ── iOS build (macOS runner) ──────────────────────────────────────────────────
  ios:
    name: iOS (xcodebuild, no signing)
    runs-on: macos-15
    needs: app-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: my-app/package-lock.json
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Install Node dependencies
        working-directory: my-app
        run: npm ci
      - name: Download chess-core JS
        uses: actions/download-artifact@v4
        with:
          name: chess-core-js
          path: my-app/src/generated/chess-core
      - name: Checkout compose-multiplatform-chess for assets
        uses: actions/checkout@v4
        with:
          repository: ber4444/compose-multiplatform-chess
          path: compose-multiplatform-chess
      - name: Generate 3D assets
        working-directory: my-app
        run: npm run prepare:assets
        env:
          COMPOSE_CHESS_PATH: ${{ github.workspace }}/compose-multiplatform-chess
      - name: Cache CocoaPods
        id: pod-cache
        uses: actions/cache@v4
        with:
          path: my-app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('my-app/ios/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-
      - name: CocoaPods install
        working-directory: my-app/ios
        run: pod install
      - name: xcodebuild (no signing)
        working-directory: my-app
        run: |
          xcodebuild \
            -workspace ios/myapp.xcworkspace \
            -scheme myapp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  # ── Android build ─────────────────────────────────────────────────────────────
  android:
    name: Android (gradlew assembleDebug)
    runs-on: ubuntu-latest
    needs: app-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: my-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Install Node dependencies
        working-directory: my-app
        run: npm ci
      - name: Download chess-core JS
        uses: actions/download-artifact@v4
        with:
          name: chess-core-js
          path: my-app/src/generated/chess-core
      - name: Checkout compose-multiplatform-chess for assets
        uses: actions/checkout@v4
        with:
          repository: ber4444/compose-multiplatform-chess
          path: compose-multiplatform-chess
      - name: Generate 3D assets
        working-directory: my-app
        run: npm run prepare:assets
        env:
          COMPOSE_CHESS_PATH: ${{ github.workspace }}/compose-multiplatform-chess
      - name: assembleDebug
        working-directory: my-app/android
        run: ./gradlew assembleDebug --no-daemon
